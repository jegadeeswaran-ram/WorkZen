name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  REGISTRY: ghcr.io
  GITHUB_ORG: ${{ github.repository_owner }}

jobs:
  # ──────────────────────────────────────────
  # 1. Lint & Type-check
  # ──────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  # ──────────────────────────────────────────
  # 2. Unit & Integration Tests
  # ──────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: workzen_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate Prisma Client
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/workzen_test
      - name: Run DB Migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/workzen_test
      - name: Run Tests
        run: npm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/workzen_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-min-32-chars-long-here
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-ok
          NODE_ENV: test

  # ──────────────────────────────────────────
  # 3. Build Docker Images
  # ──────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker meta (API)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.GITHUB_ORG }}/workzen-api
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GITHUB_ORG }}/workzen-web:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.GITHUB_ORG }}/workzen-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # 4. Deploy to Staging (develop branch)
  # ──────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.workzen.in
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: Deploy to staging
        run: |
          kubectl set image deployment/workzen-api api=${{ env.REGISTRY }}/${{ env.GITHUB_ORG }}/workzen-api:${{ needs.build.outputs.image-tag }} -n workzen
          kubectl set image deployment/workzen-web web=${{ env.REGISTRY }}/${{ env.GITHUB_ORG }}/workzen-web:${{ needs.build.outputs.image-tag }} -n workzen
          kubectl set image deployment/workzen-worker worker=${{ env.REGISTRY }}/${{ env.GITHUB_ORG }}/workzen-api:${{ needs.build.outputs.image-tag }} -n workzen
          kubectl rollout status deployment/workzen-api -n workzen --timeout=120s
          kubectl rollout status deployment/workzen-web -n workzen --timeout=120s

  # ──────────────────────────────────────────
  # 5. Deploy to Production (main branch, manual approval)
  # ──────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://workzen.in
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
      - name: Run DB Migrations (Production)
        run: |
          kubectl exec -n workzen deployment/workzen-api -- npx prisma migrate deploy
      - name: Deploy to production (rolling update)
        run: |
          IMAGE_TAG=${{ needs.build.outputs.image-tag }}
          kubectl set image deployment/workzen-api api=${{ env.REGISTRY }}/${{ env.GITHUB_ORG }}/workzen-api:${IMAGE_TAG} -n workzen
          kubectl set image deployment/workzen-web web=${{ env.REGISTRY }}/${{ env.GITHUB_ORG }}/workzen-web:${IMAGE_TAG} -n workzen
          kubectl set image deployment/workzen-worker worker=${{ env.REGISTRY }}/${{ env.GITHUB_ORG }}/workzen-api:${IMAGE_TAG} -n workzen
          kubectl rollout status deployment/workzen-api -n workzen --timeout=300s
          kubectl rollout status deployment/workzen-web -n workzen --timeout=300s
          kubectl rollout status deployment/workzen-worker -n workzen --timeout=300s
      - name: Verify deployment health
        run: |
          kubectl get pods -n workzen
          kubectl top pods -n workzen
      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {"text": "✅ WorkZen v${{ needs.build.outputs.image-tag }} deployed to production successfully by ${{ github.actor }}"}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/workzen-api -n workzen
          kubectl rollout undo deployment/workzen-web -n workzen
          kubectl rollout undo deployment/workzen-worker -n workzen
