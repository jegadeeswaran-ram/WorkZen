name: workzen_mobile
description: WorkZen – Manpower ERP Mobile App for field employees

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP
  dio: ^5.4.0

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  fl_chart: ^0.67.0

  # Location & Maps
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # Camera
  image_picker: ^1.1.2

  # Notifications
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19
  flutter_local_notifications: ^17.1.2

  # Utils
  intl: ^0.20.2
  timeago: ^3.6.1
  url_launcher: ^6.2.5

  # SVG rendering
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/app-icon.svg
    - assets/images/fav-icon.svg
    - assets/images/we-sidebar-dark.svg
    - assets/images/web-login-dark.svg
    - assets/images/splash-screen.svg
    - assets/images/app-login-screen.svg
