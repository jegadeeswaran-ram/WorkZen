version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: workzen_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [workzen]
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [workzen]

  api:
    image: ghcr.io/${GITHUB_ORG}/workzen-api:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/workzen_prod
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    env_file: [.env.prod]
    depends_on: [postgres, redis]
    networks: [workzen]
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G

  worker:
    image: ghcr.io/${GITHUB_ORG}/workzen-api:${IMAGE_TAG:-latest}
    restart: always
    command: node dist/worker.js
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/workzen_prod
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    env_file: [.env.prod]
    depends_on: [postgres, redis]
    networks: [workzen]

  web:
    image: ghcr.io/${GITHUB_ORG}/workzen-web:${IMAGE_TAG:-latest}
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.workzen.in
    networks: [workzen]
    deploy:
      replicas: 2

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro
    depends_on: [api, web]
    networks: [workzen]

volumes:
  postgres_data:
  redis_data:

networks:
  workzen:
    driver: bridge
