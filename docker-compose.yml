version: '3.9'

services:
  # ----------------------------------------
  # PostgreSQL Database
  # ----------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: workzen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: workzen_db
      POSTGRES_USER: workzen
      POSTGRES_PASSWORD: workzen_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - workzen-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U workzen -d workzen_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # PostgreSQL Shadow DB (Prisma migrations)
  # ----------------------------------------
  postgres-shadow:
    image: postgres:16-alpine
    container_name: workzen-postgres-shadow
    restart: unless-stopped
    environment:
      POSTGRES_DB: workzen_shadow
      POSTGRES_USER: workzen
      POSTGRES_PASSWORD: workzen_pass
    ports:
      - '5433:5432'
    networks:
      - workzen-network

  # ----------------------------------------
  # Redis Cache + Queue
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: workzen-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - workzen-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # MinIO (S3-compatible storage)
  # ----------------------------------------
  minio:
    image: minio/minio:latest
    container_name: workzen-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    networks:
      - workzen-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # ----------------------------------------
  # Redis Commander (dev UI)
  # ----------------------------------------
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: workzen-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      - redis
    networks:
      - workzen-network
    profiles:
      - tools

  # ----------------------------------------
  # Mailhog (dev email catcher)
  # ----------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: workzen-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - workzen-network
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  workzen-network:
    driver: bridge
