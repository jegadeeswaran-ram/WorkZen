apiVersion: apps/v1
kind: Deployment
metadata:
  name: workzen-api
  namespace: workzen
  labels:
    app: workzen-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: workzen-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: workzen-api
    spec:
      containers:
        - name: api
          image: ghcr.io/GITHUB_ORG/workzen-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: workzen-config
            - secretRef:
                name: workzen-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: workzen-api-svc
  namespace: workzen
spec:
  selector:
    app: workzen-api
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workzen-api-hpa
  namespace: workzen
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workzen-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
