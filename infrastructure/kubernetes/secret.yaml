# IMPORTANT: Replace base64 values before applying. Use: echo -n 'value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: workzen-secrets
  namespace: workzen
type: Opaque
data:
  DATABASE_URL: REPLACE_WITH_BASE64
  REDIS_URL: REPLACE_WITH_BASE64
  JWT_SECRET: REPLACE_WITH_BASE64
  JWT_REFRESH_SECRET: REPLACE_WITH_BASE64
  ENCRYPTION_KEY: REPLACE_WITH_BASE64
  AWS_ACCESS_KEY_ID: REPLACE_WITH_BASE64
  AWS_SECRET_ACCESS_KEY: REPLACE_WITH_BASE64
  ANTHROPIC_API_KEY: REPLACE_WITH_BASE64
  SMTP_PASS: REPLACE_WITH_BASE64
